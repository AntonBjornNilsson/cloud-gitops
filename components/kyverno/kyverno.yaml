---
apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kyverno-repo
  namespace: kyverno
spec:
  interval: 10m0s
  url: https://kyverno.github.io/kyverno/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 30m
  chart:
    spec:
      chart: kyverno
      version: "3.7.1"
      sourceRef:
        kind: HelmRepository
        name: kyverno-repo
        namespace: kyverno
      interval: 12h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Admission controller configuration
    admissionController:
      replicas: 2
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"
      # Configure the admission webhook
      serviceMonitor:
        enabled: false
    # Background controller for generate and mutate existing policies
    backgroundController:
      replicas: 2
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "200m"
    # Cleanup controller for TTL-based cleanup policies
    cleanupController:
      replicas: 1
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "200m"
    # Reports controller for policy reports
    reportsController:
      replicas: 1
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "200m"
    # Configure webhook failure policy
    config:
      # Resources to exclude from policy enforcement
      resourceFiltersExcludeNamespaces:
        - kube-system
        - kyverno
        - flux-system
      # Webhook timeout in seconds
      webhookTimeout: 10
    # Feature flags
    features:
      policyExceptions:
        enabled: true
        namespace: "kyverno"
      autoUpdateWebhooks:
        enabled: true