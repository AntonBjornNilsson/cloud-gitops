apiVersion: v1
kind: Namespace
metadata:
  name: victoriametrics
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: victoriametrics
  namespace: victoriametrics
spec:
  interval: 1h
  url: https://victoriametrics.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoriametrics
  namespace: victoriametrics
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
      interval: 12h
  # Timeout for Helm operations
  timeout: 10m
  values:
    fullnameOverride: "vm-k8s-stack"

    grafana:
      assertNoLeakedSecrets: false
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana.${domain}

      grafana.ini:
        server:
          root_url: https://grafana.${domain}
        auth:
          signout_redirect_url: ${victoriametrics_auth_redirect_url}
          oauth_auto_login: true
        auth.generic_oauth:
          name: authentik
          enabled: true
          client_id: ${victoriametrics_client_id}
          client_secret: ${victoriametrics_client_secret}
          scopes: "openid profile email"
          auth_url: ${victoriametrics_auth_url}
          token_url: ${victoriametrics_token_url}
          api_url: ${victoriametrics_api_url}
          role_attribute_path: contains(groups, 'Grafana Admins') && 'Admin' || contains(groups, 'Grafana Editors') && 'Editor' || 'Viewer'
