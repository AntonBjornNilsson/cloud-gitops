apiVersion: v1
kind: Namespace
metadata:
  name: oauth2-proxy
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
spec:
  interval: 1h
  url: https://kostiantyn-matsebora.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
spec:
  interval: 30m
  chart:
    spec:
      chart: simple-oauth2-proxy
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
      interval: 12h
  # Timeout for Helm operations
  timeout: 10m
  valuesFrom:
    - kind: ConfigMap
      name: oauth2-values
      valuesKey: values.yaml
    