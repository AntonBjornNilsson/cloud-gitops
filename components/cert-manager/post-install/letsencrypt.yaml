apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-nginx
  namespace: cert-manager
spec:
  acme:
    email: ${admin_email}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-nginx
    solvers:
    - dns01:
        webhook:
          groupName: com.github.runnerm.cert-manager-simply-webhook
          solverName: simply-dns-solver
          config:
            secretName: simply-credentials
      selector:
        dnsZones:
        - '${domain}'
---
apiVersion: v1
kind: Secret
metadata:
  name: simply-credentials
  namespace: cert-manager
data:
  account-name: ${simply_account_name}
  api-key: ${simply_api_key}
  domain-filter: ${simply_domain}
type: Opaque