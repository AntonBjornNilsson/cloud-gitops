apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn-repo
  namespace: longhorn-system
spec:
  interval: 10m0s
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn-release
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: longhorn-repo
      version: v1.10.1
  interval: 10m0s
  values:
    persistence:
      # defaultClassReplicaCount: 1
      reclaimPolicy: Delete
      migratable: true
    # csi:
    #   attacherReplicaCount: 1
    #   provisionerReplicaCount: 1
    #   resizerReplicaCount: 1
    #   snapshotterReplicaCount: 1
    defaultSettings:
      # defaultReplicaCount: 1
      storageOverProvisioningPercentage: 100
      storageMinimalAvailablePercentage: 10
      taintToleration: "GPU=true:NoSchedule"

    defaultBackupStore:
      backupTarget: ${s3_bucket_longhorn}
      backupTargetCredentialSecret: longhorn-backup-target-secret
      pollInterval: 500

    longhornManager:
      tolerations:
      - key: "GPU"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
    longhornDriver:
      tolerations:
      - key: "GPU"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
    # longhornUI:
    #   replicas: 1
---
