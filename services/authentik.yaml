---
apiVersion: v1
kind: Namespace
metadata:
  name: authentik
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 24h
  url: https://charts.goauthentik.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 12h
  chart:
    spec:
      chart: authentik
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: authentik
      interval: 12h
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 3m
  values:
    global:
      envFrom:
        - secretRef:
            name: bootstrap-credentials
    authentik:
      # This sends anonymous usage-data, stack traces on errors and
      # performance data to sentry.io, and is fully opt-in
      error_reporting:
        enabled: true
      postgresql:
        password: ${authentik_postgres_password}

    server:
      ingress:
        enabled: true

        ingressClassName: nginx
        hosts:
          - authentik.${domain}

    postgresql:
      enabled: true
      auth:
        password: ${authentik_postgres_password}

---
apiVersion: v1
kind: Secret
metadata:
  name: bootstrap-credentials
  namespace: authentik
type: Opaque
stringData:
  AUTHENTIK_BOOTSTRAP_PASSWORD: ${authentik_bootstrap_password}
  AUTHENTIK_BOOTSTRAP_TOKEN: ${authentik_bootstrap_token}
  AUTHENTIK_SECRET_KEY: ${authentik_secret_key}
