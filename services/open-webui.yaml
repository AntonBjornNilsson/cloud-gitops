---
apiVersion: v1
kind: Namespace
metadata:
  name: open-webui
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: open-webui
  namespace: open-webui
spec:
  interval: 24h
  url: https://helm.openwebui.com/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: open-webui
spec:
  interval: 11h
  chart:
    spec:
      chart: open-webui
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: open-webui
      interval: 12h
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 3m
  values:
    sso:
      enabled: true
      enableSignup: true
      oidc:
        enabled: true
        clientId: ${open_webui_client_id}
        clientSecret: ${open_webui_client_secret}
        providerUrl: ${open_webui_provider_url}
        providerName: ${open_webui_provider_name}
        scopes: ${open_webui_scopes}
    replicaCount: 1

    tolerations:
    - key: "GPU"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

    ollama:
      enabled: false

    ollamaUrls:
      - http://ollama.ollama.svc.cluster.local:11434

    websocket:
      enabled: true
      manager: redis
      redis:
        enabled: true

    pipelines:
      enabled: false

    tika:
      enabled: false

    ingress:
      enabled: true
      class: "nginx"
      host: "ai.${domain}"

    persistentVolume:
      enabled: true
      existingClaim: pvc-openwebui

    logging:
      components:
        ollama: "debug"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-openwebui
  namespace: open-webui
  labels:
    recurring-job.longhorn.io/daily-backup: enabled
    recurring-job-group.longhorn.io/default: enabled
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi