---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: gha-runner-scale-set-controller
  namespace: arc-system
spec:
  interval: 24h
  url: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gha-runner-scale-set-controller
  namespace: arc-system
spec:
  interval: 12h
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: gha-runner-scale-set-controller
        namespace: arc-system
      interval: 12h
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
    crds: CreateReplace
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 3m
    crds: CreateReplace
  values:
    replicaCount: 1
    image:
      repository: ghcr.io/actions/gha-runner-scale-set-controller
      pullPolicy: IfNotPresent
    serviceAccount:
      create: true
    flags:
      logLevel: info
      logFormat: json
