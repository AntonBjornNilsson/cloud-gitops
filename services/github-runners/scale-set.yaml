---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-runners
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: gha-runner-scale-set
  namespace: arc-runners
spec:
  interval: 24h
  url: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gha-runner-scale-set
  namespace: arc-runners
spec:
  dependsOn:
    - name: gha-runner-scale-set-controller
      namespace: arc-system
  interval: 12h
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: gha-runner-scale-set
        namespace: arc-runners
      interval: 12h
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
    crds: CreateReplace
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 3m
    crds: CreateReplace
  values:
    # GitHub configuration URL - Update this with your repo/org
    githubConfigUrl: "https://github.com/AntonBjornNilsson/cloud-gitops"

    # GitHub credentials - reference secret from cloud-gitops-secrets
    githubConfigSecret:
      github_token: ""

    # Runner configuration
    runnerGroup: "default"
    minRunners: 0
    maxRunners: 5

    # Container mode for runners
    containerMode:
      type: "dind"

    # Pod template for runners
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/home/runner/run.sh"]
