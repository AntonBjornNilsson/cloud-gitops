---
apiVersion: v1
kind: Namespace
metadata:
  name: ollama
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ollama
  namespace: ollama
spec:
  interval: 24h
  url: https://otwld.github.io/ollama-helm/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: ollama
spec:
  interval: 11h
  chart:
    spec:
      chart: ollama
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: ollama
        namespace: ollama
      interval: 12h
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 3m


  values:

    service:
      type: LoadBalancer
    image:
      tag: "rocm" # force amd
    persistentVolume:
      enabled: true
    gpu:
      enabled: true
      type: "amd"
      number: 1
    tolerations:
    - key: "GPU"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
    resources:
      requests:
        memory: "4Gi"
        cpu: "2"
        amd.com/gpu: "1"
      limits:
        memory: "10Gi"
        cpu: "6"
        amd.com/gpu: "1"
    extraEnv:
      - name: OLLAMA_DEBUG
        value: "2"
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Service
            patch: |
              apiVersion: apps/v1
              kind: Service
              metadata:
                name: ollama
                annotations:
                  meta.helm.sh/release-name: ollama
                  meta.helm.sh/release-namespace: ollama
                  metallb.io/loadBalancerIPs: "192.168.21.41"


