apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: system-cert-manager
  namespace: flux-system
spec:
  interval: 2m0s
  path: ./components/cert-manager
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: system-cert-manager-post-install
  namespace: flux-system
spec:
  interval: 2m0s
  path: ./components/cert-manager/post-install
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: system-cert-manager
    - name: secrets-kustomization
  wait: true
---
